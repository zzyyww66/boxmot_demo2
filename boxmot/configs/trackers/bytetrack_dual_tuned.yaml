# Fixed best joint SOMPT22 + MOT20 ByteTrack config from trial_028_full_from_trial_024
min_conf:
  type: uniform
  default: 0.1
  range: [0.1, 0.3]

track_thresh:
  type: uniform
  default: 0.5
  range: [0.4, 0.7]

new_track_thresh:
  type: uniform
  default: 0.65
  range: [0.4, 0.9]

track_buffer:
  type: qrandint
  default: 30
  range: [10, 61, 10]

match_thresh:
  type: uniform
  default: 0.78
  range: [0.7, 0.9]

frame_rate:
  type: choice
  default: 30
  options: [25, 30]

# Joint best defaults
entry_margin:
  type: qrandint
  default: 50  # enable effective entry region margin (matches final tuned setup)
  range: [0, 101, 10]

strict_entry_gate:
  type: choice
  default: false
  options: [true, false]

birth_confirm_frames:
  type: qrandint
  default: 2  # enabled two-hit confirmation
  range: [1, 4, 1]

birth_suppress_iou:
  type: uniform
  default: 0.7
  range: [0.0, 0.9]

birth_suppress_center_dist:
  type: qrandint
  default: 25
  range: [0, 101, 5]

zombie_max_history:
  type: qrandint
  default: 100
  range: [50, 201, 10]

zombie_dist_thresh:
  type: qrandint
  default: 150
  range: [50, 301, 10]

zombie_transition_frames:
  type: qrandint
  default: 30  # 转为僵尸的帧数阈值，默认等于buffer_size
  range: [20, 61, 5]

lost_max_history:
  type: qrandint
  default: 0  # 0 means unlimited
  range: [0, 401, 20]

zombie_match_max_dist:
  type: qrandint
  default: 200  # 僵尸匹配距离上限（像素）
  range: [100, 301, 20]

zombie_max_predict_frames:
  type: qrandint
  default: 5
  range: [3, 11, 1]

zombie_reid_enabled:
  type: choice
  default: true
  options: [true, false]

zombie_reid_weight:
  type: uniform
  default: 0.75
  range: [0.4, 0.95]

zombie_motion_weight:
  type: uniform
  default: 0.2
  range: [0.0, 0.4]

zombie_shape_weight:
  type: uniform
  default: 0.05
  range: [0.0, 0.2]

zombie_reid_thresh:
  type: uniform
  default: 0.35
  range: [0.1, 0.6]

zombie_match_cost_thresh:
  type: uniform
  default: 0.45
  range: [0.2, 0.8]

zombie_shape_max_ratio:
  type: uniform
  default: 2.0
  range: [1.2, 4.0]

zombie_reid_min_box_area:
  type: qrandint
  default: 1024
  range: [0, 4097, 256]

# Recent lost-track recovery before zombie/new birth
lost_reid_enabled:
  type: choice
  default: true
  options: [true, false]

lost_match_max_dist:
  type: qrandint
  default: 100
  range: [60, 241, 10]

lost_reid_max_frames:
  type: qrandint
  default: 15
  range: [3, 31, 1]

lost_reid_weight:
  type: uniform
  default: 0.7
  range: [0.4, 0.9]

lost_motion_weight:
  type: uniform
  default: 0.25
  range: [0.05, 0.4]

lost_shape_weight:
  type: uniform
  default: 0.05
  range: [0.0, 0.2]

lost_reid_thresh:
  type: uniform
  default: 0.25
  range: [0.1, 0.5]

lost_match_cost_thresh:
  type: uniform
  default: 0.35
  range: [0.15, 0.6]

lost_shape_max_ratio:
  type: uniform
  default: 1.8
  range: [1.2, 3.0]

lost_reid_min_box_area:
  type: qrandint
  default: 1024
  range: [0, 4097, 256]

# Exit zone configuration
exit_zone_enabled:
  type: choice
  default: true
  options: [true, false]

exit_zone_margin:
  type: qrandint
  default: 50  # exit zone margin (pixels), can share with entry_margin
  range: [0, 101, 10]

exit_zone_remove_grace:
  type: qrandint
  default: 30  # grace frames before removing an exit-pending lost track
  range: [1, 31, 1]

# Adaptive effective zone configuration
adaptive_zone_enabled:
  type: choice
  default: true
  options: [true, false]

adaptive_zone_update_mode:
  type: choice
  default: warmup_once
  options: [always_expand, warmup_once]

adaptive_zone_expand_trigger:
  type: choice
  default: outside_high
  options: [all_high, outside_high, unmatched_high]

adaptive_zone_entry_mode:
  type: choice
  default: outside_only
  options: [outside_only, margin_inside]

adaptive_zone_warmup:
  type: qrandint
  default: 10
  range: [5, 31, 1]

adaptive_zone_margin:
  type: qrandint
  default: 50
  range: [20, 101, 10]

adaptive_zone_padding:
  type: uniform
  default: 1.2
  range: [1.0, 1.5]

adaptive_zone_min_box_area:
  type: qrandint
  default: 0
  range: [0, 5001, 100]

# Passive spatial prior learning
spatial_prior_enabled:
  type: choice
  default: true
  options: [true, false]

spatial_prior_grid_w:
  type: qrandint
  default: 48
  range: [16, 97, 8]

spatial_prior_grid_h:
  type: qrandint
  default: 27
  range: [9, 65, 6]

spatial_prior_sigma:
  type: uniform
  default: 1.5
  range: [0.5, 3.5]

spatial_prior_decay:
  type: uniform
  default: 0.999
  range: [0.95, 1.0]

spatial_prior_birth_commit_age:
  type: qrandint
  default: 3
  range: [1, 11, 1]

spatial_prior_birth_commit_hits:
  type: qrandint
  default: 3
  range: [1, 11, 1]

spatial_prior_support_min_age:
  type: qrandint
  default: 2
  range: [1, 11, 1]

spatial_prior_entry_mode:
  type: choice
  default: bias_only
  options: [bias_only, strict_region]

spatial_prior_recovery_cooldown:
  type: qrandint
  default: 5
  range: [0, 21, 1]

spatial_prior_region_enabled:
  type: choice
  default: true
  options: [true, false]

spatial_prior_region_conf:
  type: uniform
  default: 1.0
  range: [0.1, 10.0]

spatial_prior_region_walk:
  type: uniform
  default: 0.05
  range: [0.0, 1.0]

spatial_prior_region_birth:
  type: uniform
  default: 0.85
  range: [0.05, 1.0]

spatial_prior_region_birth_grow:
  type: uniform
  default: 0.6
  range: [0.0, 1.0]

spatial_prior_region_grow_max_steps:
  type: qrandint
  default: 3
  range: [0, 9, 1]

spatial_prior_region_component_mean_ratio:
  type: uniform
  default: 0.45
  range: [0.0, 1.0]

spatial_prior_region_component_max_area:
  type: qrandint
  default: 0
  range: [0, 257, 8]

spatial_prior_entry_band_radius:
  type: qrandint
  default: 2
  range: [0, 7, 1]

spatial_prior_entry_support_threshold:
  type: qrandint
  default: 100
  range: [20, 401, 20]

spatial_prior_entry_birth_threshold:
  type: qrandint
  default: 8
  range: [2, 31, 1]
